openapi: 3.0.0
info:
  title: Snapbooth REST API Documentation
  description: API for Snapbooth (CBP Rupiah Photobooth) Backend.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

paths:
  /api/auth/login:
    post:
      summary: Admin Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials
  /api/auth/logout:
    post:
      summary: Admin Logout
      tags: [Auth]
      responses:
        200:
          description: Logout successful
  /api/auth/me:
    get:
      summary: Get current admin profile
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Profile fetched
  /api/auth/change-password:
    post:
      summary: Change admin password
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string }
                newPassword: { type: string }
      responses:
        200:
          description: Password changed

  /api/sessions:
    post:
      summary: Create a new photobooth session
      tags: [Sessions]
      responses:
        200:
          description: Session created
  /api/sessions/{id}:
    get:
      summary: Get session details
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Session fetched
    delete:
      summary: Delete a session (Admin only)
      tags: [Sessions]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Session deleted
  /api/sessions/{id}/complete:
    patch:
      summary: Mark session as complete with a template
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateId]
              properties:
                templateId: { type: string }
      responses:
        200:
          description: Session completed

  /api/photos/upload:
    post:
      summary: Upload a photo for a session
      tags: [Photos]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [sessionId, photoNumber, file]
              properties:
                sessionId: { type: string }
                photoNumber: { type: string, description: "1-4" }
                file: { type: string, format: binary }
      responses:
        200:
          description: Photo uploaded
  /api/photos/{id}/retake:
    patch:
      summary: Retake a specific photo
      tags: [Photos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        200:
          description: Photo updated
  /api/photos/{id}/filter:
    patch:
      summary: Apply filter to a photo
      tags: [Photos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [filterId]
              properties:
                filterId: { type: string }
      responses:
        200:
          description: Filter applied
  /api/photos/{id}:
    get:
      summary: Get photo details
      tags: [Photos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Photo fetched
  /api/photos/session/{sessionId}:
    get:
      summary: Get all photos for a session
      tags: [Photos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Photos fetched

  /api/templates:
    get:
      summary: Get all active templates
      tags: [Templates]
      responses:
        200:
          description: Templates fetched
    post:
      summary: Create template (Admin only)
      tags: [Templates]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [thumbnail, name]
              properties:
                thumbnail: { type: string, format: binary }
                name: { type: string }
                isLandscape: { type: string }
      responses:
        200:
          description: Template created
  /api/templates/{id}:
    get:
      summary: Get template by ID
      tags: [Templates]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Template fetched
    patch:
      summary: Update template (Admin only)
      tags: [Templates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                thumbnail: { type: string, format: binary }
                name: { type: string }
                isActive: { type: string }
      responses:
        200:
          description: Template updated
    delete:
      summary: Delete template (Admin only)
      tags: [Templates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Template deleted
  /api/templates/{id}/toggle:
    patch:
      summary: Toggle template active status (Admin only)
      tags: [Templates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Template toggled

  /api/filters:
    get:
      summary: Get active filters
      tags: [Filters]
      responses:
        200:
          description: Filters fetched
    post:
      summary: Create filter (Admin only)
      tags: [Filters]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, cssFilter]
              properties:
                name: { type: string }
                cssFilter: { type: string }
                thumbnailUrl: { type: string }
      responses:
        200:
          description: Filter created
  /api/filters/{id}:
    get:
      summary: Get filter by ID
      tags: [Filters]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Filter fetched
    patch:
      summary: Update filter (Admin only)
      tags: [Filters]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                cssFilter: { type: string }
      responses:
        200:
          description: Filter updated
    delete:
      summary: Soft delete filter (Admin only)
      tags: [Filters]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Filter deleted

  /api/print:
    post:
      summary: Submit print job for a session
      tags: [Print]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId]
              properties:
                sessionId: { type: string }
      responses:
        200:
          description: Print job submitted
  /api/print/status/{printId}:
    get:
      summary: Get print job status
      tags: [Print]
      parameters:
        - name: printId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Print status fetched
  /api/print/config:
    get:
      summary: Get printer config (Admin only)
      tags: [Print]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Config fetched
    patch:
      summary: Update printer config (Admin only)
      tags: [Print]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                printerIp: { type: string }
                printerPort: { type: string }
      responses:
        200:
          description: Config updated
  /api/print/test:
    post:
      summary: Print test page (Admin only)
      tags: [Print]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Test page sent

  /api/whatsapp/send:
    post:
      summary: Send session result via WhatsApp
      tags: [WhatsApp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, phoneNumber]
              properties:
                sessionId: { type: string }
                phoneNumber: { type: string }
      responses:
        200:
          description: Message sent
  /api/whatsapp/config:
    get:
      summary: Get WhatsApp config (Admin only)
      tags: [WhatsApp]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Config fetched
    patch:
      summary: Update WhatsApp config (Admin only)
      tags: [WhatsApp]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                defaultMessage: { type: string }
      responses:
        200:
          description: Config updated

  /api/admin/sessions:
    get:
      summary: Get all sessions with pagination and filters (Admin only)
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string }
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
      responses:
        200:
          description: Sessions fetched
  /api/admin/analytics:
    get:
      summary: Get system analytics (Admin only)
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Analytics fetched
  /api/admin/config/camera:
    get:
      summary: Get camera config (Admin only)
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Camera config fetched
    patch:
      summary: Update camera config (Admin only)
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cameraSource: { type: string }
                deviceId: { type: string }
      responses:
        200:
          description: Camera config updated
  /api/admin/cleanup:
    post:
      summary: Trigger manual storage cleanup (Admin only)
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Cleanup triggered
  /api/admin/cleanup/logs:
    get:
      summary: Get recent cleanup logs (Admin only)
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Logs fetched
